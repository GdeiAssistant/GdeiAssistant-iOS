name: iOS CI

on:
  push:
    branches:
      - main
      - master
      - 'release/**'
  pull_request:
    branches:
      - main
      - master
      - 'release/**'

jobs:
  style-check:
    name: Style Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Swift style checks
        run: |
          chmod +x Tools/check_style.sh
          ./Tools/check_style.sh

  build-smoke:
    name: Build Smoke
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
      CI_XCCONFIG: .github/ci-overrides.xcconfig

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select pinned Xcode
        run: |
          if [[ ! -d "$DEVELOPER_DIR" ]]; then
            echo "Expected Xcode not found: $DEVELOPER_DIR"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          xcodebuild -version

      - name: Build simulator app
        run: |
          chmod +x Tools/build_simulator.sh
          ./Tools/build_simulator.sh

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-build-log
          path: build-simulator.log
          retention-days: 7

  unit-test:
    name: Unit Tests
    runs-on: macos-15
    needs:
      - style-check
      - build-smoke
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
      CI_XCCONFIG: .github/ci-overrides.xcconfig

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select pinned Xcode and list simulators
        run: |
          if [[ ! -d "$DEVELOPER_DIR" ]]; then
            echo "Expected Xcode not found: $DEVELOPER_DIR"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          xcodebuild -version
          xcrun simctl list devices available iPhone | head -20

      - name: Run unit tests
        run: |
          DEST=$(xcrun simctl list devices available iPhone -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devs in data.get('devices', {}).items():
              for d in devs:
                  if d.get('isAvailable') and 'iPhone' in d.get('name',''):
                      print(f\"platform=iOS Simulator,id={d['udid']}\")
                      sys.exit(0)
          sys.exit(1)
          ")
          echo "Destination: $DEST"
          set -o pipefail
          xcodebuild test \
            -project GdeiAssistant-iOS.xcodeproj \
            -scheme GdeiAssistant-iOS \
            -destination "$DEST" \
            -xcconfig "$CI_XCCONFIG" \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult \
            | tee xcodebuild-test.log

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-test-results
          path: |
            TestResults.xcresult
            xcodebuild-test.log
          retention-days: 7
